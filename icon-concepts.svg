      <!-- 64px -->
      <rect x="0" y="0" width="64" height="64" rx="14" fill="#0D0D0D" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <g opacity="0.12" transform="scale(0.125)">
        <circle cx="220" cy="240" r="80" fill="url(#g1)"/>
        <circle cx="300" cy="225" r="95" fill="url(#g1)"/>
      </g>
      <path d="M 17 50 L 17 22 L 23 22 L 32 36 L 41 22 L 47 22 L 47 50 L 42 50 L 42 32 L 34 44 L 30 44 L 22 32 L 22 50 Z" fill="url(#g1)"/>
      <circle cx="44" cy="18" r="3" fill="url(#g1b)"/>
      <circle cx="48" cy="17" r="4" fill="url(#g1b)"/>
      <circle cx="52" cy="18.5" r="2.5" fill="url(#g1b)"/>
      <rect x="43" y="18" width="10" height="3" fill="url(#g1b)"/>
      <text x="32" y="80" text-anchor="middle" fill="#555" font-family="monospace" font-size="9">64px</text>

