<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" width="1200" height="550">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4C8AE"/>
      <stop offset="50%" stop-color="#C8B89A"/>
      <stop offset="100%" stop-color="#A89474"/>
    </linearGradient>
    <linearGradient id="g1b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4C8AE"/>
      <stop offset="100%" stop-color="#C8B89A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="550" fill="#0A0A0A" rx="16"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#F5F5F8" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="22" font-weight="700">melch<tspan fill="#C8B89A">.cloud</tspan> — Icon Concepts</text>
  <text x="600" y="64" text-anchor="middle" fill="#555" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12">M + Cloud hybrid · Dark background with gold gradient</text>

  <!-- ═══ CONCEPT 1 ═══ -->
  <g transform="translate(60, 95)">
    <text x="140" y="0" text-anchor="middle" fill="#C8B89A" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" letter-spacing="2">VERSION 1</text>
    <text x="140" y="16" text-anchor="middle" fill="#666" font-family="-apple-system,sans-serif" font-size="10">Classic M + floating cloud accent</text>

    <!-- Icon background -->
    <rect x="15" y="30" width="250" height="250" rx="50" fill="#0D0D0D" stroke="rgba(200,184,154,0.15)" stroke-width="1"/>

    <!-- Cloud behind M — subtle -->
    <g opacity="0.12" transform="translate(15,30) scale(0.488)">
      <circle cx="220" cy="240" r="80" fill="url(#g1)"/>
      <circle cx="300" cy="225" r="95" fill="url(#g1)"/>
      <circle cx="365" cy="255" r="65" fill="url(#g1)"/>
      <rect x="170" y="240" width="230" height="80" fill="url(#g1)"/>
    </g>

    <!-- M letterform -->
    <path d="
      M 83 215
      L 83 115
      L 105 115
      L 140 171
      L 175 115
      L 197 115
      L 197 215
      L 177 215
      L 177 150
      L 147 200
      L 135 200
      L 105 150
      L 105 215
      Z
    " fill="url(#g1)"/>

    <!-- Small cloud accent top-right -->
    <g>
      <circle cx="181" cy="100" r="11" fill="url(#g1b)"/>
      <circle cx="194" cy="96" r="14" fill="url(#g1b)"/>
      <circle cx="208" cy="101" r="9" fill="url(#g1b)"/>
      <rect x="179" y="100" width="32" height="11" fill="url(#g1b)"/>
