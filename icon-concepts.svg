      " fill="url(#g1)"/>
      <text x="32" y="80" text-anchor="middle" fill="#555" font-family="monospace" font-size="9">64px</text>

      <rect x="90" y="16" width="32" height="32" rx="7" fill="#0D0D0D" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <path d="
        M 99 41
        L 99 27
        C 99 24, 101 22, 103 22
        C 105 22, 106 23, 107 25
        C 108 23, 109 22, 111 22
        C 113 22, 115 24, 115 27
        L 115 41
        L 113 41
        L 113 33
        L 108 39
        L 106 39
        L 101 33
        L 101 41
        Z
      " fill="url(#g1)"/>
      <text x="106" y="80" text-anchor="middle" fill="#555" font-family="monospace" font-size="9">32px</text>

      <rect x="155" y="24" width="16" height="16" rx="3" fill="#0D0D0D" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <path d="
        M 159 37
