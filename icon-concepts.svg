      M 78 238
      L 78 135
      C 78 115, 93 98, 110 98
      C 122 98, 132 105, 137 115
      C 142 103, 153 95, 167 95
      C 187 95, 203 113, 203 135
      L 203 238
      L 183 238
      L 183 160
      L 150 215
      L 134 215
      L 100 160
      L 100 238
