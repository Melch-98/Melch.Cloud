        <circle cx="115" cy="118" r="30"/>
        <circle cx="150" cy="108" r="37"/>
        <circle cx="185" cy="121" r="25"/>
        <rect x="88" y="118" width="118" height="24" rx="2"/>
        <rect x="88" y="118" width="20" height="120" rx="2"/>
        <rect x="186" y="118" width="20" height="120" rx="2"/>
        <polygon points="98,118 140,185 130,185 88,118"/>
        <polygon points="196,118 158,185 148,185 206,118"/>
        <rect x="122" y="155" width="16" height="83" rx="2"/>
        <rect x="154" y="155" width="16" height="83" rx="2"/>
      </g>
      <text x="32" y="80" text-anchor="middle" fill="#555" font-family="monospace" font-size="9">64px</text>

      <rect x="90" y="16" width="32" height="32" rx="7" fill="#0D0D0D" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <g fill="url(#g1)" transform="translate(94,18) scale(0.095)">
        <circle cx="115" cy="118" r="30"/>
        <circle cx="150" cy="108" r="37"/>
        <circle cx="185" cy="121" r="25"/>
        <rect x="88" y="118" width="118" height="24" rx="2"/>
        <rect x="88" y="118" width="20" height="120" rx="2"/>
        <rect x="186" y="118" width="20" height="120" rx="2"/>
        <polygon points="98,118 140,185 130,185 88,118"/>
        <polygon points="196,118 158,185 148,185 206,118"/>
        <rect x="122" y="155" width="16" height="83" rx="2"/>
        <rect x="154" y="155" width="16" height="83" rx="2"/>
      </g>
      <text x="106" y="80" text-anchor="middle" fill="#555" font-family="monospace" font-size="9">32px</text>

      <rect x="155" y="24" width="16" height="16" rx="3" fill="#0D0D0D" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <g fill="url(#g1)" transform="translate(157,25) scale(0.047)">
        <circle cx="115" cy="118" r="30"/>
        <circle cx="150" cy="108" r="37"/>
        <circle cx="185" cy="121" r="25"/>
        <rect x="88" y="118" width="118" height="24" rx="2"/>
        <rect x="88" y="118" width="20" height="120" rx="2"/>
        <rect x="186" y="118" width="20" height="120" rx="2"/>
      </g>
      <text x="163" y="80" text-anchor="middle" fill="#555" font-family="monospace" font-size="9">16px</text>
    </g>
  </g>

  <!-- ═══ CONCEPT 3 ═══ -->
  <g transform="translate(800, 95)">
    <text x="140" y="0" text-anchor="middle" fill="#C8B89A" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" letter-spacing="2">VERSION 3</text>
    <text x="140" y="16" text-anchor="middle" fill="#666" font-family="-apple-system,sans-serif" font-size="10">M peaks curve into cloud arcs — minimal</text>

    <!-- Icon background -->
    <rect x="15" y="30" width="250" height="250" rx="50" fill="#0D0D0D" stroke="rgba(200,184,154,0.15)" stroke-width="1"/>

    <!-- M with cloud-curved peaks -->
