<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4C8AE"/>
      <stop offset="50%" stop-color="#C8B89A"/>
      <stop offset="100%" stop-color="#A89474"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="#0A0A0A" rx="16"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#F5F5F8" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="22" font-weight="700">melch<tspan fill="#C8B89A">.cloud</tspan> — Abstract Marks</text>
  <text x="600" y="60" text-anchor="middle" fill="#555" font-family="-apple-system,sans-serif" font-size="12">No letters. Pure shape. Gold gradient on dark.</text>

  <!-- ═══ CONCEPT A1: Stacked Cards ═══ -->
  <g transform="translate(60, 85)">
    <text x="140" y="0" text-anchor="middle" fill="#C8B89A" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" letter-spacing="2">STACKED CARDS</text>
    <text x="140" y="16" text-anchor="middle" fill="#666" font-family="-apple-system,sans-serif" font-size="10">Creative assets fanning out + play button</text>

    <rect x="15" y="30" width="250" height="250" rx="50" fill="#0D0D0D" stroke="rgba(200,184,154,0.15)" stroke-width="1"/>

    <!-- Back card -->
    <rect x="102" y="78" width="110" height="143" rx="9" fill="none" stroke="url(#g1)" stroke-width="2.5" opacity="0.2" transform="rotate(-8 157 149)"/>
    <!-- Middle card -->
    <rect x="97" y="75" width="110" height="143" rx="9" fill="none" stroke="url(#g1)" stroke-width="2.5" opacity="0.45" transform="rotate(-3 152 146)"/>
    <!-- Front card -->
    <rect x="91" y="72" width="110" height="143" rx="9" fill="url(#g1)" opacity="0.12" stroke="url(#g1)" stroke-width="2.5" transform="rotate(2 146 143)"/>
    <!-- Play triangle -->
    <polygon points="131,130 131,163 157,146" fill="url(#g1)" opacity="0.9"/>

    <!-- Sizes -->
    <g transform="translate(30, 300)">
      <rect x="0" y="0" width="56" height="56" rx="12" fill="#0D0D0D" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <!-- Mini stacked cards -->
      <rect x="17" y="12" width="26" height="34" rx="3" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.2" transform="rotate(-8 30 29)"/>
      <rect x="15" y="11" width="26" height="34" rx="3" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.45" transform="rotate(-3 28 28)"/>
      <rect x="13" y="10" width="26" height="34" rx="3" fill="url(#g1)" opacity="0.12" stroke="url(#g1)" stroke-width="1.5" transform="rotate(2 26 27)"/>
      <polygon points="22,23 22,33 31,28" fill="url(#g1)" opacity="0.9"/>
      <text x="28" y="70" text-anchor="middle" fill="#555" font-family="monospace" font-size="9">56px</text>

      <rect x="80" y="12" width="32" height="32" rx="7" fill="#0D0D0D" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <rect x="89" y="17" width="16" height="22" rx="2" fill="none" stroke="url(#g1)" stroke-width="1" opacity="0.3" transform="rotate(-5 97 28)"/>
      <rect x="88" y="16" width="16" height="22" rx="2" fill="url(#g1)" opacity="0.15" stroke="url(#g1)" stroke-width="1" transform="rotate(2 96 27)"/>
      <polygon points="93,24 93,32 100,28" fill="url(#g1)" opacity="0.9"/>
      <text x="96" y="70" text-anchor="middle" fill="#555" font-family="monospace" font-size="9">32px</text>

      <rect x="140" y="20" width="16" height="16" rx="3" fill="#0D0D0D" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <rect x="144" y="23" width="8" height="10" rx="1" fill="url(#g1)" opacity="0.15" stroke="url(#g1)" stroke-width="0.8"/>
      <polygon points="146,26 146,31 150,28.5" fill="url(#g1)" opacity="0.9"/>
      <text x="148" y="70" text-anchor="middle" fill="#555" font-family="monospace" font-size="9">16px</text>
    </g>
  </g>

  <!-- ═══ CONCEPT A2: Flow Ribbons ═══ -->
  <g transform="translate(430, 85)">
    <text x="140" y="0" text-anchor="middle" fill="#C8B89A" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" letter-spacing="2">FLOW RIBBONS</text>
    <text x="140" y="16" text-anchor="middle" fill="#666" font-family="-apple-system,sans-serif" font-size="10">Creative flow, movement, streaming</text>

    <rect x="15" y="30" width="250" height="250" rx="50" fill="#0D0D0D" stroke="rgba(200,184,154,0.15)" stroke-width="1"/>

    <!-- Three flowing ribbons -->
    <path d="M 70 120 C 115 90, 175 170, 215 115" fill="none" stroke="url(#g1)" stroke-width="4" opacity="0.2" stroke-linecap="round"/>
    <path d="M 70 155 C 120 118, 180 200, 215 152" fill="none" stroke="url(#g1)" stroke-width="6.5" opacity="0.45" stroke-linecap="round"/>
    <path d="M 70 193 C 128 148, 185 235, 215 190" fill="none" stroke="url(#g1)" stroke-width="10" opacity="0.9" stroke-linecap="round"/>

    <!-- Sizes -->
    <g transform="translate(30, 300)">
      <rect x="0" y="0" width="56" height="56" rx="12" fill="#0D0D0D" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <path d="M 12 18 C 22 12, 34 30, 44 17" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
      <path d="M 12 26 C 24 18, 36 36, 44 25" fill="none" stroke="url(#g1)" stroke-width="2.5" opacity="0.45" stroke-linecap="round"/>
      <path d="M 12 35 C 26 26, 38 44, 44 34" fill="none" stroke="url(#g1)" stroke-width="4" opacity="0.9" stroke-linecap="round"/>
      <text x="28" y="70" text-anchor="middle" fill="#555" font-family="monospace" font-size="9">56px</text>

      <rect x="80" y="12" width="32" height="32" rx="7" fill="#0D0D0D" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <path d="M 87 22 C 92 18, 100 30, 105 21" fill="none" stroke="url(#g1)" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
      <path d="M 87 27 C 93 23, 101 33, 105 26" fill="none" stroke="url(#g1)" stroke-width="2" opacity="0.45" stroke-linecap="round"/>
      <path d="M 87 33 C 94 28, 102 38, 105 32" fill="none" stroke="url(#g1)" stroke-width="3" opacity="0.9" stroke-linecap="round"/>
      <text x="96" y="70" text-anchor="middle" fill="#555" font-family="monospace" font-size="9">32px</text>

      <rect x="140" y="20" width="16" height="16" rx="3" fill="#0D0D0D" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <path d="M 143 25 C 146 23, 150 30, 153 25" fill="none" stroke="url(#g1)" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
      <path d="M 143 30 C 147 27, 150 33, 153 29" fill="none" stroke="url(#g1)" stroke-width="2" opacity="0.9" stroke-linecap="round"/>
      <text x="148" y="70" text-anchor="middle" fill="#555" font-family="monospace" font-size="9">16px</text>
    </g>
  </g>

  <!-- ═══ CONCEPT A3: Aperture ═══ -->
  <g transform="translate(800, 85)">
    <text x="140" y="0" text-anchor="middle" fill="#C8B89A" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" letter-spacing="2">APERTURE</text>
    <text x="140" y="16" text-anchor="middle" fill="#666" font-family="-apple-system,sans-serif" font-size="10">Camera shutter blades, creative eye, focus</text>

    <rect x="15" y="30" width="250" height="250" rx="50" fill="#0D0D0D" stroke="rgba(200,184,154,0.15)" stroke-width="1"/>

    <!-- Aperture blades -->
    <g transform="translate(140,155)" fill="url(#g1)">
      <path d="M 0,-52 L 28,-16 L -16,-16 Z" opacity="0.9"/>
      <path d="M 0,-52 L 28,-16 L -16,-16 Z" opacity="0.7" transform="rotate(60)"/>
      <path d="M 0,-52 L 28,-16 L -16,-16 Z" opacity="0.5" transform="rotate(120)"/>
      <path d="M 0,-52 L 28,-16 L -16,-16 Z" opacity="0.9" transform="rotate(180)"/>
      <path d="M 0,-52 L 28,-16 L -16,-16 Z" opacity="0.7" transform="rotate(240)"/>
      <path d="M 0,-52 L 28,-16 L -16,-16 Z" opacity="0.5" transform="rotate(300)"/>
    </g>
    <circle cx="140" cy="155" r="21" fill="#0D0D0D"/>

    <!-- Sizes -->
    <g transform="translate(30, 300)">
      <rect x="0" y="0" width="56" height="56" rx="12" fill="#0D0D0D" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <g transform="translate(28,28)" fill="url(#g1)">
        <path d="M 0,-15 L 8,-5 L -5,-5 Z" opacity="0.9"/>
        <path d="M 0,-15 L 8,-5 L -5,-5 Z" opacity="0.7" transform="rotate(60)"/>
        <path d="M 0,-15 L 8,-5 L -5,-5 Z" opacity="0.5" transform="rotate(120)"/>
        <path d="M 0,-15 L 8,-5 L -5,-5 Z" opacity="0.9" transform="rotate(180)"/>
        <path d="M 0,-15 L 8,-5 L -5,-5 Z" opacity="0.7" transform="rotate(240)"/>
        <path d="M 0,-15 L 8,-5 L -5,-5 Z" opacity="0.5" transform="rotate(300)"/>
      </g>
      <circle cx="28" cy="28" r="6" fill="#0D0D0D"/>
      <text x="28" y="70" text-anchor="middle" fill="#555" font-family="monospace" font-size="9">56px</text>

      <rect x="80" y="12" width="32" height="32" rx="7" fill="#0D0D0D" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <g transform="translate(96,28)" fill="url(#g1)">
        <path d="M 0,-9 L 5,-3 L -3,-3 Z" opacity="0.9"/>
        <path d="M 0,-9 L 5,-3 L -3,-3 Z" opacity="0.7" transform="rotate(60)"/>
        <path d="M 0,-9 L 5,-3 L -3,-3 Z" opacity="0.5" transform="rotate(120)"/>
        <path d="M 0,-9 L 5,-3 L -3,-3 Z" opacity="0.9" transform="rotate(180)"/>
        <path d="M 0,-9 L 5,-3 L -3,-3 Z" opacity="0.7" transform="rotate(240)"/>
        <path d="M 0,-9 L 5,-3 L -3,-3 Z" opacity="0.5" transform="rotate(300)"/>
      </g>
      <circle cx="96" cy="28" r="4" fill="#0D0D0D"/>
      <text x="96" y="70" text-anchor="middle" fill="#555" font-family="monospace" font-size="9">32px</text>

      <rect x="140" y="20" width="16" height="16" rx="3" fill="#0D0D0D" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <g transform="translate(148,28)" fill="url(#g1)">
        <path d="M 0,-5 L 3,-1.5 L -2,-1.5 Z" opacity="0.85"/>
        <path d="M 0,-5 L 3,-1.5 L -2,-1.5 Z" opacity="0.85" transform="rotate(120)"/>
        <path d="M 0,-5 L 3,-1.5 L -2,-1.5 Z" opacity="0.85" transform="rotate(240)"/>
      </g>
      <circle cx="148" cy="28" r="2" fill="#0D0D0D"/>
      <text x="148" y="70" text-anchor="middle" fill="#555" font-family="monospace" font-size="9">16px</text>
    </g>
  </g>
</svg>
