<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4C8AE"/>
      <stop offset="50%" stop-color="#C8B89A"/>
      <stop offset="100%" stop-color="#A89474"/>
    </linearGradient>
    <linearGradient id="dark2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>

  <!-- Background — rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#dark2)"/>

  <!-- Cloud shape forms the top portion, M legs extend down from it -->
  <!-- Cloud body -->
  <g fill="url(#gold2)">
    <!-- Cloud puffs -->
    <circle cx="210" cy="195" r="62"/>
    <circle cx="280" cy="170" r="75"/>
    <circle cx="350" cy="200" r="52"/>
    <!-- Cloud base connecting to M -->
    <rect x="155" y="195" width="240" height="50" rx="4"/>

    <!-- M legs dropping from cloud base -->
    <!-- Left leg -->
    <rect x="155" y="195" width="42" height="195" rx="4"/>
    <!-- Left inner leg -->
    <rect x="225" y="245" width="36" height="145" rx="4" transform="rotate(-0 243 317)"/>
    <!-- Right inner leg -->
    <rect x="253" y="245" width="36" height="145" rx="4"/>
    <!-- Right leg -->
    <rect x="353" y="195" width="42" height="195" rx="4"/>

    <!-- M diagonal strokes -->
    <polygon points="176,195 256,310 236,310 155,195"/>
    <polygon points="376,195 296,310 276,310 395,195"/>
  </g>
</svg>
