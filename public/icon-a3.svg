<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4C8AE"/>
      <stop offset="50%" stop-color="#C8B89A"/>
      <stop offset="100%" stop-color="#A89474"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="#0A0A0A"/>

  <!-- Aperture/shutter-inspired geometric — six blades forming a hexagonal opening -->
  <!-- Suggests camera, creative eye, focus -->
  <g transform="translate(256,256)" fill="url(#g)">
    <!-- Blade 1 -->
    <path d="M 0,-95 L 50,-30 L -30,-30 Z" opacity="0.9"/>
    <!-- Blade 2 -->
    <path d="M 0,-95 L 50,-30 L -30,-30 Z" opacity="0.7" transform="rotate(60)"/>
    <!-- Blade 3 -->
    <path d="M 0,-95 L 50,-30 L -30,-30 Z" opacity="0.5" transform="rotate(120)"/>
    <!-- Blade 4 -->
    <path d="M 0,-95 L 50,-30 L -30,-30 Z" opacity="0.9" transform="rotate(180)"/>
    <!-- Blade 5 -->
    <path d="M 0,-95 L 50,-30 L -30,-30 Z" opacity="0.7" transform="rotate(240)"/>
    <!-- Blade 6 -->
    <path d="M 0,-95 L 50,-30 L -30,-30 Z" opacity="0.5" transform="rotate(300)"/>
  </g>

  <!-- Center void — dark circle to create the aperture opening -->
  <circle cx="256" cy="256" r="38" fill="#0A0A0A"/>
</svg>
