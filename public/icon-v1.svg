<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8B89A"/>
      <stop offset="100%" stop-color="#A89474"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4C8AE"/>
      <stop offset="100%" stop-color="#C8B89A"/>
    </linearGradient>
    <clipPath id="roundedSquare">
      <rect x="32" y="32" width="448" height="448" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="#0A0A0A"/>
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.2"/>

  <!-- Cloud shape — subtle, behind the M -->
  <g opacity="0.12">
    <circle cx="220" cy="240" r="80" fill="url(#gold)"/>
    <circle cx="300" cy="225" r="95" fill="url(#gold)"/>
    <circle cx="365" cy="255" r="65" fill="url(#gold)"/>
    <rect x="170" y="240" width="230" height="80" rx="0" fill="url(#gold)"/>
  </g>

  <!-- M letterform — bold, geometric -->
  <path d="
    M 140 380
    L 140 175
    L 185 175
    L 256 290
    L 327 175
    L 372 175
    L 372 380
    L 330 380
    L 330 248
    L 268 348
    L 244 348
    L 182 248
    L 182 380
    Z
  " fill="url(#gold)"/>

  <!-- Small cloud accent — sits on top-right of M like a dot -->
  <g>
    <circle cx="340" cy="148" r="22" fill="url(#goldLight)"/>
    <circle cx="365" cy="140" r="28" fill="url(#goldLight)"/>
    <circle cx="393" cy="150" r="18" fill="url(#goldLight)"/>
    <rect x="335" y="148" width="63" height="22" fill="url(#goldLight)"/>
  </g>
</svg>
